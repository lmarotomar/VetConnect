<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | VetConnect</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1f2e 50%, #0d1117 100%);
            padding: 2rem;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .auth-logo h1 { font-size: 1.75rem; color: var(--brand-green); margin: 0; }
        .auth-logo p { color: var(--text-muted); margin-top: 0.5rem; }

        .auth-form .form-group { margin-bottom: 1.5rem; }

        .auth-form .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .auth-form .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .auth-form .form-input:focus {
            outline: none;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(64, 224, 208, 0.1);
        }

        .auth-form .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: rgba(64, 224, 208, 0.1);
            border: 1px solid var(--brand-green);
            color: var(--brand-green);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
        }

        .loading { opacity: 0.6; pointer-events: none; }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .password-requirements {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="icon">🐾</div>
                <h1>VetConnect</h1>
                <p>Establece tu nueva contraseña</p>
                <div style="font-size: 0.75rem; color: var(--brand-green); margin-top: -5px;">by BioVetAI</div>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form class="auth-form" id="resetForm" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="8">
                    <div class="password-requirements">Mínimo 8 caracteres</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" id="resetBtn">
                    Guardar Contraseña
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="login.html" style="color: var(--text-muted); font-size: 0.875rem; text-decoration: none;">
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase from config
        const cfg = window.VETCONNECT_CONFIG?.supabase;
        if (!cfg) {
            document.getElementById('errorMessage').textContent = 'Error de configuración. Contacta al administrador.';
            document.getElementById('errorMessage').style.display = 'block';
        }

        const supabaseClient = cfg
            ? window.supabase.createClient(cfg.url, cfg.anonKey)
            : null;

        async function handleReset(event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const form = document.getElementById('resetForm');

            hideMessages();

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden.');
                return;
            }

            btn.innerHTML = '<span class="spinner"></span>Guardando...';
            form.classList.add('loading');

            try {
                const { error } = await supabaseClient.auth.updateUser({ password });
                if (error) throw error;

                showSuccess('Contraseña actualizada. Redirigiendo...');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);

            } catch (error) {
                showError(error.message || 'Error al actualizar la contraseña.');
                btn.innerHTML = 'Guardar Contraseña';
                form.classList.remove('loading');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>

</html>
